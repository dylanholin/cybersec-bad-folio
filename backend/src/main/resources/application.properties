# Database
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:devfolio}
spring.datasource.username=${DB_USER:devfolio_app}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# CORS : origines autorisees (separees par des virgules)
# En production, definir CORS_ALLOWED_ORIGINS (ex: https://<VPS_IP>)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.env.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.shutdown.enabled=false

# Error handling
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.root=WARN
logging.level.com.devfolio=INFO
logging.file.name=devfolio.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
