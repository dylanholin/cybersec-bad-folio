# Docker Compose Staging — VPS
# Nginx hôte gère le TLS (ports 80/443 public).
# Les conteneurs écoutent uniquement sur 127.0.0.1.
# Images pré-construites depuis GHCR (pas de build local).
# IMAGE_TAG doit être défini dans .env (SHA du commit ou version sémantique).

services:
  mariadb:
    image: mariadb:10.11
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./database/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./database/init-template.sql:/templates/init-template.sql:ro
      - db_data:/var/lib/mysql
    networks:
      - backend-db
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    image: ghcr.io/dylanholin/devfolio-backend:${IMAGE_TAG}
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    networks:
      - frontend-backend
      - backend-db
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: ghcr.io/dylanholin/devfolio-frontend:${IMAGE_TAG}
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - frontend-backend
    restart: unless-stopped

networks:
  frontend-backend:
  backend-db:

volumes:
  db_data:
