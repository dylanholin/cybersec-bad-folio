name: CI

on:
  push:
    branches: [ci-cd-pipeline]
  pull_request:
    branches: [ci-cd-pipeline]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-backend:
    name: Tests backend (JUnit + Mockito)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile et tests backend
        working-directory: backend
        run: mvn clean test -B

  test-frontend:
    name: Tests frontend (Vitest) + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Tests frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  scan-sast:
    name: Scan SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Semgrep
        run: python3 -m pip install semgrep

      - name: Semgrep scan (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif .
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  build-and-push:
    name: Build, scan Trivy, push GHCR
    needs: [test-backend, test-frontend, scan-sast]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/devfolio-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/devfolio-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/devfolio-backend:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          exit-code: '1'

      - name: Scan frontend (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/devfolio-frontend:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          exit-code: '1'

      - name: Push backend vers GHCR
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devfolio-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend vers GHCR
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devfolio-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Déploiement continu (SSH → VPS)
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/ci-cd-pipeline'
    env:
      IMAGE_TAG: ${{ github.sha }}
      GHCR_USER: ${{ github.repository_owner }}
      GHCR_TOKEN: ${{ secrets.VPS_GHCR_TOKEN }}
      PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR || '/opt/devfolio' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déploiement sur le VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_USER: ${{ env.GHCR_USER }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
          PROJECT_DIR: ${{ env.PROJECT_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,PROJECT_DIR
          script: |
            set -e

            # Se placer dans le dossier du projet
            cd "$PROJECT_DIR"

            # Mettre a jour IMAGE_TAG dans .env
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env

            # Recuperer le docker-compose.staging.yml a jour
            git fetch origin ci-cd-pipeline
            git checkout origin/ci-cd-pipeline -- docker-compose.staging.yml

            # Login GHCR pour pull les images privees
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull des nouvelles images
            docker compose -f docker-compose.staging.yml pull

            # Redemarrage des conteneurs
            docker compose -f docker-compose.staging.yml up -d

            # Attendre le healthcheck du backend (max 60s)
            echo "Verification du healthcheck backend..."
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8080/api/actuator/health > /dev/null 2>&1; then
                echo "Backend OK"
                break
              fi
              echo "Tentative $i/12 - backend pas encore pret..."
              sleep 5
            done

            # Verification finale
            if ! curl -sf http://127.0.0.1:8080/api/actuator/health > /dev/null 2>&1; then
              echo "ERREUR: backend non accessible apres 60s"
              docker compose -f docker-compose.staging.yml logs --tail=50 backend
              exit 1
            fi

            echo "Deploiement termine avec succes"
